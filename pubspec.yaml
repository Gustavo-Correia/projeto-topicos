name: assinaturas_ninja
description: App Flutter offline para controle financeiro de assinaturas recorrentes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  provider: ^6.1.5+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.3
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/app_icon_master.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
